version: "3.9"

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-law_review}
      POSTGRES_USER: ${POSTGRES_USER:-law_review}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-law_review_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-law_review} -d ${POSTGRES_DB:-law_review}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb --ignore-existing local/${STORAGE_BUCKET:-law-review-platform};
      exit 0;
      "

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      ENVIRONMENT: production
      DATABASE_URL: ${DATABASE_URL:-postgresql://law_review:law_review_password@postgres:5432/law_review}
      STORAGE_TYPE: ${STORAGE_TYPE:-minio}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-law-review-platform}
      STORAGE_ENDPOINT: ${STORAGE_ENDPOINT:-http://minio:9000}
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY:-minioadmin}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY:-minioadmin}
      STORAGE_SECURE: ${STORAGE_SECURE:-false}
    command: >
      /bin/sh -c "alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000"
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "8000:8000"

  worker:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      ENVIRONMENT: production
      DATABASE_URL: ${DATABASE_URL:-postgresql://law_review:law_review_password@postgres:5432/law_review}
      STORAGE_TYPE: ${STORAGE_TYPE:-minio}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-law-review-platform}
      STORAGE_ENDPOINT: ${STORAGE_ENDPOINT:-http://minio:9000}
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY:-minioadmin}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY:-minioadmin}
      STORAGE_SECURE: ${STORAGE_SECURE:-false}
    command: ["python", "-m", "scripts.job_worker"]
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_data:
  minio_data:
